name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run tests (unit, integration, doctests)
        run: cargo test --all-features --workspace

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --all-features --workspace -- -D warnings
      - name: Build docs (deny warnings)
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps --all-features --workspace

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - name: Run tests under coverage instrumentation
        run: cargo llvm-cov --no-report --all-features --workspace
      - name: Generate report (lcov + console summary)
        run: |
          cargo llvm-cov report --lcov --output-path lcov.info
          cargo llvm-cov report --summary-only
      - name: Upload coverage to Codecov
        # Public repo: tokenless upload works from GitHub Actions. If you ever
        # hit Codecov rate-limit flakes, add a CODECOV_TOKEN secret and a
        # `token:` line here.
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: lcov
          path: lcov.info
